<div class="about-university-container" dir="rtl">
  <div class="container-custom">
    <!-- Page Header -->
    <div class="page-header fade-in">
      <h1>عن الجامعة</h1>
      <p class="lead">تعرف على تاريخ ورؤية ورسالة جامعتنا العريقة</p>
    </div>

    <!-- Navigation Tabs -->
    <div class="tabs-container slide-up animate-delay-1">
      <div class="tabs-wrapper">
        <div class="tabs-list" role="tablist">
          <a
            *ngFor="let tab of tabs"
            [routerLink]="['/about', tab.id]"
            routerLinkActive="active"
            class="tab-item"
            [class.active]="isActiveTab(tab.id)"
            role="tab"
            [attr.aria-selected]="isActiveTab(tab.id)"
          >
            <i [class]="tab.icon"></i>
            <span>{{ tab.title }}</span>
          </a>
        </div>
      </div>
    </div>

    <!-- Content Area -->
    <div class="content-container slide-up animate-delay-2">
      <div class="content-wrapper">
        <!-- Loading State -->
        <div *ngIf="isLoading" class="loading-container">
          <div class="loading-spinner"></div>
        </div>

        <!-- Content Display -->
        <div *ngIf="!isLoading && section" class="content-section fade-in">
          <!-- Overview -->
          <div *ngIf="isActiveTab('overview')" [innerHTML]="section?.content | cleanHtml"></div>

          <!-- Vision -->
          <div *ngIf="isActiveTab('vision')" [innerHTML]="section?.vision | cleanHtml"></div>

          <!-- Mission -->
          <div *ngIf="isActiveTab('mission')" [innerHTML]="section?.mission | cleanHtml"></div>

          <!-- Goals -->
          <div *ngIf="isActiveTab('goals')" class="goals-list">
            <ul>
              <li *ngFor="let goal of section?.goals">
                <!-- <i class="pi pi-check-circle"></i> -->
                {{ goal.goalName }}
              </li>
            </ul>
          </div>

          <!-- History -->
          <div *ngIf="isActiveTab('history')" [innerHTML]="section?.history | cleanHtml"></div>
        </div>

        <!-- No Content State -->
        <div *ngIf="!isLoading && !section" class="no-content">
          <i class="pi pi-info-circle"></i>
          <p>لا توجد محتويات متاحة</p>
        </div>
      </div>
    </div>
  </div>
</div>
