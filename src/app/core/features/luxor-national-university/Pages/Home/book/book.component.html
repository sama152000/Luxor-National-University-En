<!-- Loading State -->
<section class="book-section" *ngIf="isLoading">
  <div class="container">
    <p>Loading...</p>
  </div>
</section>

<!-- Error State -->
<section class="book-section" *ngIf="hasError && !isLoading">
  <div class="container">
    <p>Sorry, an error occurred while loading the data</p>
  </div>
</section>

<!-- Main Content - Show when data is loaded -->
<section class="book-section" *ngIf="!isLoading && !hasError && deanSpeech">
  <div class="container book animate-on-scroll book-closed">

    <!-- Left Page -->
    <div class="book-page left-page">
      <div class="page-content" [innerHTML]="deanSpeech.speech|cleanHtml"></div>
    </div>

    <!-- Right Page -->
    <div class="book-page right-page">
      <h3>Discover Our University</h3>
      <div class="video-wrapper" *ngIf="deanSpeech.deanSpeechAttachments && deanSpeech.deanSpeechAttachments.length > 0">
        <video
          controls
          muted
          loop
          playsinline  
          class="video-element">
          <source [src]="deanSpeech.deanSpeechAttachments[0].url" type="video/mp4">
          Your browser does not support video playback.
        </video>
      </div>
    </div>
  </div>
</section>
