<section class="gallery-section" dir="rtl">
  <div class="container-custom">
    <!-- Section Header -->
    <div class="gallery-header slide-down">
      <h2 class="gallery-title">Photo Gallery</h2>
      <p class="gallery-subtitle">Explore the campus and academic life</p>
      <div class="gallery-divider"></div>
    </div>

    <!-- Gallery Grid -->
    <div class="gallery-grid">
      <div 
        *ngFor="let image of galleryItems; let i = index" 
        class="gallery-item"
        [style.animation-delay.ms]="i * 100"
        (click)="openLightbox(image)">
        <div class="image-container">
          <img 
            [src]="image.url" 
            [alt]="image.fileName"
            class="gallery-image"
            loading="lazy">
          <div class="image-overlay">
            <div class="overlay-content">
              <i class="pi pi-search-plus overlay-icon" aria-hidden="true"></i>
              <span class="sr-only">View image in full screen</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Lightbox Modal -->
  <div 
    class="lightbox-overlay"
    *ngIf="isLightboxOpen"
    [class.active]="isLightboxOpen"
    (click)="onLightboxBackgroundClick($event)">
    
    <div class="lightbox-container">
      <!-- Close Button -->
      <button 
        class="lightbox-close" 
        (click)="closeLightbox()"
        aria-label="Close Gallery">
        <i class="pi pi-times" aria-hidden="true"></i>
      </button>

      <!-- Navigation Buttons -->
      <button 
        class="lightbox-nav lightbox-prev" 
        (click)="previousImage()"
        aria-label="Previous Image">
        <i class="pi pi-chevron-right" aria-hidden="true"></i>
      </button>

      <button 
        class="lightbox-nav lightbox-next" 
        (click)="nextImage()"
        aria-label="Next Image">
        <i class="pi pi-chevron-left" aria-hidden="true"></i>
      </button>

      <!-- Image -->
      <div class="lightbox-image-container" *ngIf="selectedImage">
        <img 
          [src]="selectedImage.url" 
          [alt]="selectedImage.fileName"
          class="lightbox-image">
      </div>
    </div>
  </div>
</section>
